<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spending">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spending 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --text: #f0f0f5;
    --text-muted: #7a7a90;
    --costina: #fa6c9a;
    --mario: #6cf0c2;
    --together: #facc6c;
    --lista: #60c5fa;
    --peretu: #b8fa6c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header { text-align: center; margin-bottom: 28px; }

  header h1 {
    font-family: 'Inter', sans-serif;
    font-size: clamp(26px, 6vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--mario), var(--costina), var(--together));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--text-muted); margin-top: 6px; font-size: 14px; }

  .container { max-width: 860px; margin: 0 auto; }

  /* TABS */
  .tabs {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .tab-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .tab-btn .tab-icon { font-size: 22px; }
  .tab-btn .tab-name { font-size: 14px; }
  .tab-btn .tab-total { font-size: 12px; color: var(--text-muted); font-weight: 600; }

  .tab-btn.active-mario    { border-color: var(--mario);    color: var(--mario);    background: rgba(108,240,194,0.07); }
  .tab-btn.active-costina  { border-color: var(--costina);  color: var(--costina);  background: rgba(250,108,154,0.07); }
  .tab-btn.active-together { border-color: var(--together); color: var(--together); background: rgba(250,204,108,0.07); }
  .tab-btn.active-mario    .tab-total { color: var(--mario); }
  .tab-btn.active-costina  .tab-total { color: var(--costina); }
  .tab-btn.active-together .tab-total { color: var(--together); }
  .tab-btn.active-lista    { border-color: var(--lista);    color: var(--lista);    background: rgba(96,197,250,0.07); }
  .tab-btn.active-lista    .tab-total { color: var(--lista); }
  .tab-btn.active-peretu   { border-color: var(--peretu);   color: var(--peretu);   background: rgba(184,250,108,0.07); }
  .tab-btn.active-peretu   .tab-total { color: var(--peretu); }
  .tab-btn.active-istoric  { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.07); }
  .tab-btn.active-istoric  .tab-total { color: #a78bfa; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: grid; gap: 20px; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
  }

  .card h2 {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1 / -1; }

  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: #7c6cfa; }
  select option { background: var(--surface2); }

  .btn-add {
    width: 100%; border: none; border-radius: 12px;
    color: #0a0a0d;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
    padding: 13px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
  }
  .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }
  .btn-mario    { background: var(--mario); }
  .btn-costina  { background: var(--costina); }
  .btn-together { background: var(--together); }

  /* VISUAL ROW */
  .visual-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  canvas { display: block; }

  .chart-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }

  .chart-total { position: absolute; text-align: center; pointer-events: none; }
  .chart-total span { display: block; font-family: 'Inter', sans-serif; }
  .chart-total .lbl { font-size: 11px; color: var(--text-muted); }
  .chart-total .val { font-size: 18px; font-weight: 800; color: var(--text); }

  /* CATEGORIES */
  .cat-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-row { display: flex; align-items: center; gap: 10px; }
  .cat-icon {
    font-size: 18px; width: 34px; height: 34px;
    border-radius: 8px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .cat-info { flex: 1; }
  .cat-info .cat-name { font-size: 13px; font-weight: 500; }
  .cat-info .cat-bar-wrap { height: 5px; background: var(--border); border-radius: 999px; margin-top: 4px; }
  .cat-info .cat-bar { height: 5px; border-radius: 999px; transition: width 0.4s ease; }
  .cat-amount { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; white-space: nowrap; }

  /* TRANSACTIONS */
  .txn-list { display: flex; flex-direction: column; gap: 8px; }

  .txn-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border-radius: 12px;
    padding: 12px 14px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .txn-icon {
    font-size: 20px; width: 38px; height: 38px;
    background: var(--surface); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .txn-info { flex: 1; min-width: 0; }
  .txn-info .txn-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-info .txn-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .txn-right { text-align: right; flex-shrink: 0; }
  .txn-amount { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; }

  .txn-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px; margin-top: 3px;
  }
  .badge-mario    { background: rgba(108,240,194,0.15); color: var(--mario); }
  .badge-costina  { background: rgba(250,108,154,0.15); color: var(--costina); }
  .badge-together { background: rgba(250,204,108,0.15); color: var(--together); }

  .btn-del {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 16px; padding: 4px;
    border-radius: 6px; transition: color 0.2s; flex-shrink: 0;
  }
  .btn-del:hover { color: #fa6c9a; }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 28px 0; }

  .sap-card { background: var(--surface2); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .sap-dates { font-size: 13px; font-weight: 700; color: var(--text); font-family: Inter, sans-serif; }
  .sap-totals { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .sap-total-item { font-size: 12px; }
  .sap-total-item span { font-weight: 700; }
  .sap-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .sap-detail.open { display: block; }

  @media (max-width: 600px) {
    .visual-row { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .tabs { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .tab-btn { font-size: 11px; padding: 8px 4px; }
    .tab-btn .tab-icon { font-size: 16px; }
    .tab-btn .tab-name { font-size: 11px; }
    .tab-btn .tab-total { font-size: 10px; }
  }

  /* ── WEEK BANNER ── */
  .week-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .week-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .week-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(108,240,194,0.15), rgba(250,204,108,0.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .week-info { flex: 1; min-width: 0; }
  .week-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-family: Inter, sans-serif; font-weight: 700; }
  .week-dates { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; font-family: Inter, sans-serif; }
  .week-day { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .btn-close-week {
    background: linear-gradient(135deg, #fa6c9a, #facc6c);
    border: none; border-radius: 12px; color: #0a0a0d;
    font-family: Inter, sans-serif; font-size: 12px; font-weight: 700;
    padding: 10px 14px; cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s; flex-shrink: 0;
  }
  .btn-close-week:hover { opacity: 0.85; }

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// ── PWA & NOTIFICĂRI ──
async function initPWA() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('sw.js');
      console.log('Service Worker registered');
    } catch(e) {
      console.log('SW registration failed:', e);
    }
  }

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    setTimeout(async () => {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        scheduleWeekEndNotification();
      }
    }, 3000); // Ask after 3 seconds
  } else if (Notification.permission === 'granted') {
    scheduleWeekEndNotification();
  }
}

function scheduleWeekEndNotification() {
  if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;

  const end = getWeekEnd();
  const alertTime = new Date(end.getTime() - 10 * 60 * 60 * 1000); // 10h before
  const now = new Date();
  const delay = alertTime - now;

  if (delay > 0) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SCHEDULE_NOTIFICATION',
      title: '⚠️ Spending — Săptămâna se închide!',
      body: 'Mai sunt 10 ore până la închiderea săptămânii. Nu uita să înregistrezi cheltuielile!',
      delay
    });
    console.log('Notificare programată în ' + Math.round(delay/1000/60) + ' minute');
  }
}

// Show install prompt for iOS
function showInstallTip() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const shown = localStorage.getItem('install_tip_shown');

  if (isIOS && !isStandalone && !shown) {
    setTimeout(() => {
      const tip = document.createElement('div');
      tip.style.cssText = 'position:fixed;bottom:90px;left:16px;right:16px;background:#18181f;border:1px solid #2e2e3a;border-radius:16px;padding:14px 16px;z-index:999;display:flex;align-items:center;gap:12px;animation:fadeIn 0.3s ease;';
      tip.innerHTML = `<span style="font-size:22px">📲</span><div style="flex:1;font-size:13px;color:#f0f0f5;">Adaugă pe ecranul principal: apasă <strong>□↑</strong> apoi <strong>"Adaugă pe ecran"</strong></div><button onclick="this.parentElement.remove();localStorage.setItem('install_tip_shown','1')" style="background:none;border:none;color:#7a7a90;font-size:18px;cursor:pointer;">✕</button>`;
      document.body.appendChild(tip);
      setTimeout(() => tip.remove(), 8000);
      localStorage.setItem('install_tip_shown', '1');
    }, 2000);
  }
}

initPWA();
showInstallTip();
</script>
</body>
</html>
